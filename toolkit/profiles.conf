# ============================================================
# Audio Conversion Profiles
# ============================================================
# Linggawasistha Djohari, Bad Harmony 2026
# Each [profile] section defines encoding parameters.
# Used by audio-convert.sh via --profile <name>
#
# Fields:
#   format     = output format (mp3 | wav)
#   bitrate    = MP3 bitrate (kbps) - ignored for WAV
#   quality    = LAME VBR quality 0-9 (0=best) - only for mp3 V0
#   samplerate = Output sample rate in Hz (e.g. 44100, 48000)
#   channels   = Number of channels (1=mono, 2=stereo)
#   mode       = cbr | vbr (MP3 only)
#   bit_depth  = WAV bit depth: 16, 24, 32 (WAV only)
# ============================================================

[mp3-v0]
# LAME V0 (~245 kbps VBR) - transparent quality, widely compatible
format      = mp3
mode        = vbr
quality     = 0
samplerate  = 44100
channels    = 2

[mp3-v2]
# LAME V2 (~190 kbps VBR) - great quality, smaller files
format      = mp3
mode        = vbr
quality     = 2
samplerate  = 44100
channels    = 2

[mp3-320]
# CBR 320 kbps - maximum constant bitrate MP3
format      = mp3
mode        = cbr
bitrate     = 320
samplerate  = 44100
channels    = 2

[mp3-192]
# CBR 192 kbps - good quality, reasonable size
format      = mp3
mode        = cbr
bitrate     = 192
samplerate  = 44100
channels    = 2

[mp3-128]
# CBR 128 kbps - small files, acceptable quality
format      = mp3
mode        = cbr
bitrate     = 128
samplerate  = 44100
channels    = 2

[wav-cd]
# CD quality WAV - 16-bit 44.1 kHz stereo
format      = wav
samplerate  = 44100
channels    = 2
bit_depth   = 16

[wav-hq]
# High quality WAV - 24-bit 48 kHz stereo (studio)
format      = wav
samplerate  = 48000
channels    = 2
bit_depth   = 24

[wav-32]
# 32-bit float WAV - maximum precision for processing
format      = wav
samplerate  = 48000
channels    = 2
bit_depth   = 32

[wav-mono]
# Mono WAV - voice/speech, 16-bit 44.1 kHz
format      = wav
samplerate  = 44100
channels    = 1
bit_depth   = 16

[mp3-mono]
# Mono MP3 V0 - voice/podcast
format      = mp3
mode        = vbr
quality     = 0
samplerate  = 44100
channels    = 1
